name: Pagamento ou callback
description: Reportar divergências de fingerprint, redireccionamento, callback ou estado de transação.
title: "[Pagamento]: "
labels:
  - pagamento
  - callback
body:
  - type: markdown
    attributes:
      value: |
        Use apenas dados fictícios. Não inclua posAutCode, token real, PAN completo, CVV, recibos reais ou dados pessoais.
  - type: dropdown
    id: topic
    attributes:
      label: Tema
      options:
        - Fingerprint de pagamento
        - Formulario / redireccionamento
        - Callback
        - Estado da transação
        - Idempotência
        - 3DS
        - Refund
        - Outro
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Payload reduzido e anonimizado
      description: Use valores fictícios. Troque credenciais por placeholders.
      render: php
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Resultado observado
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmações
      options:
        - label: Usei apenas dados fictícios ou anonimizados.
          required: true
        - label: Não inclui dados reais de cartão, CVV, token, posAutCode ou recibos reais.
          required: true
