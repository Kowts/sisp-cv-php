name: Bug de integração
description: Reportar falhas ao integrar a biblioteca com frameworks, PDO, CLI ou ambiente PHP.
title: "[Integração]: "
labels:
  - bug
  - integração
body:
  - type: markdown
    attributes:
      value: |
        Use este formulário para problemas técnicos. Não inclua posAutCode, tokens, PAN completo, CVV, recibos reais, credenciais ou dados pessoais.
  - type: dropdown
    id: area
    attributes:
      label: Área afectada
      options:
        - PHP puro
        - Laravel
        - Symfony
        - Yii2
        - PDO / persistência
        - CLI
        - Composer / instalação
        - Outro
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Versão do pacote
      placeholder: v0.1.0, dev-main ou hash do commit
    validations:
      required: true
  - type: input
    id: php
    attributes:
      label: Versão do PHP
      placeholder: "8.3.6"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Ambiente técnico
      description: Sistema operativo, framework, versão do framework, driver PDO e extensões relevantes.
      placeholder: |
        SO:
        Framework:
        Driver PDO:
        Extensões PHP:
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Comportamento observado
      description: Inclua mensagens de erro e stack trace, removendo dados sensíveis.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Confirmações
      options:
        - label: Removi tokens, posAutCode, dados de cartão, credenciais e dados pessoais.
          required: true
        - label: Verifiquei se o problema ocorre na versão mais recente disponível.
          required: false
