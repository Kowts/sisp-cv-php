name: Produção / segurança
description: Pedir ajuda sobre hardening, operação, release, reconciliação ou reporte de risco não sensível.
title: "[Produção]: "
labels:
  - produção
  - segurança
body:
  - type: markdown
    attributes:
      value: |
        Vulnerabilidades devem ser reportadas pelo separador Security, não por issue pública.
  - type: dropdown
    id: area
    attributes:
        label: Área
      options:
        - Configuração de produção
        - Logs / auditoria
        - Reconciliação
        - Persistência
        - CI / release
        - Segurança não sensível
        - Outro
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Questão
      description: Descreva a dúvida sem credenciais nem dados pessoais.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Contexto técnico
      placeholder: |
        Ambiente:
        Framework:
        Driver PDO:
        Modo de deploy:
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmações
      options:
        - label: Não inclui segredos, dados de cartão, recibos reais ou dados pessoais.
          required: true
        - label: Entendo que este projecto não é oficial da SISP/Vinti4.
          required: true
