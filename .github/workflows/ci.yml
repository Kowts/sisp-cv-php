name: Testes

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - name: Obter código
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Configurar PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Instalar dependências
        run: composer install --no-interaction --prefer-dist

      - name: Validar pacote Composer
        run: composer validate --strict

      - name: Testes
        run: composer test

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.2'
          extensions: json, pdo, pdo_sqlite, sqlite3
          coverage: xdebug
      - run: composer install --no-interaction --prefer-dist
      - run: composer cs
      - run: composer analyse
      - name: Verificar referência automática da API
        run: composer docs:api:check
      - name: Cobertura mínima
        run: |
          composer coverage
          php tools/check-coverage.php build/coverage.xml 60
      - name: Auditoria de dependências
        run: composer audit

  dependency-range:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            composer_update_flags: '--prefer-lowest --prefer-stable'
            label: dependências mínimas
          - php: '8.4'
            composer_update_flags: ''
            label: dependências recentes
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, pdo, pdo_sqlite, sqlite3
          coverage: none
      - name: Resolver ${{ matrix.label }}
        run: composer update ${{ matrix.composer_update_flags }} --no-interaction --prefer-dist
      - run: composer validate --strict
      - run: composer check

  yii2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.2'
          extensions: json, pdo
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - name: Instalar Yii2 apenas para teste de compatibilidade
        run: |
          composer config repositories.asset-packagist composer https://asset-packagist.org
          composer require --dev yiisoft/yii2 --with-all-dependencies --no-interaction --prefer-dist
      - run: php vendor/bin/phpunit tests/Yii2BridgeTest.php

  database:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: sisp
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --password=root"
          --health-interval=10s --health-timeout=5s --health-retries=10
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: sisp
          POSTGRES_PASSWORD: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready --username=postgres --dbname=sisp"
          --health-interval=10s --health-timeout=5s --health-retries=10
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: SispSqlServer!2026
        ports:
          - 1433:1433
    env:
      fail-fast: true
      SISP_TEST_MYSQL_DSN: mysql:host=127.0.0.1;port=3306;dbname=sisp
      SISP_TEST_MYSQL_USER: root
      SISP_TEST_MYSQL_PASSWORD: root
      SISP_TEST_PGSQL_DSN: pgsql:host=127.0.0.1;port=5432;dbname=sisp
      SISP_TEST_PGSQL_USER: postgres
      SISP_TEST_PGSQL_PASSWORD: root
      SISP_TEST_SQLSRV_DSN: sqlsrv:Server=127.0.0.1,1433;Database=sisp;TrustServerCertificate=1
      SISP_TEST_SQLSRV_ADMIN_DSN: sqlsrv:Server=127.0.0.1,1433;Database=master;TrustServerCertificate=1
      SISP_TEST_SQLSRV_USER: sa
      SISP_TEST_SQLSRV_PASSWORD: SispSqlServer!2026
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.3'
          extensions: json, pdo, pdo_mysql, pdo_pgsql, pdo_sqlite, sqlsrv, pdo_sqlsrv, sqlite3
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - name: Confirmar driver PDO SQL Server
        run: |
          php --ri pdo_sqlsrv
          php -r 'if (!in_array("sqlsrv", PDO::getAvailableDrivers(), true)) { fwrite(STDERR, "O driver pdo_sqlsrv não foi carregado." . PHP_EOL); exit(1); }'
      - name: Aguardar e preparar SQL Server
        shell: bash
        run: |
          for attempt in {1..30}; do
            if php -r 'try { new PDO(getenv("SISP_TEST_SQLSRV_ADMIN_DSN"), getenv("SISP_TEST_SQLSRV_USER"), getenv("SISP_TEST_SQLSRV_PASSWORD")); } catch (Throwable $exception) { fwrite(STDERR, $exception->getMessage()); exit(1); }'; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              exit 1
            fi
            sleep 2
          done
          php -r '$pdo = new PDO(getenv("SISP_TEST_SQLSRV_ADMIN_DSN"), getenv("SISP_TEST_SQLSRV_USER"), getenv("SISP_TEST_SQLSRV_PASSWORD")); if ((int) $pdo->query("SELECT DB_ID(NCHAR(115) + NCHAR(105) + NCHAR(115) + NCHAR(112))")->fetchColumn() === 0) { $pdo->exec("CREATE DATABASE [sisp]"); }'
      - run: php vendor/bin/phpunit tests/PdoStorageTest.php tests/PdoDriverIntegrationTest.php
