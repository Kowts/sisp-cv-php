name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: json, pdo, pdo_sqlite, sqlite3
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: composer validate --strict
      - run: composer check
      - name: Criar pacote Composer
        run: |
          mkdir -p dist
          composer archive \
            --format=zip \
            --dir=dist \
            --file="sisp-cv-${GITHUB_REF_NAME}"
          mkdir -p dist/package
          unzip -q "dist/sisp-cv-${GITHUB_REF_NAME}.zip" -d dist/package
          composer install \
            --working-dir=dist/package \
            --no-dev \
            --no-interaction \
            --prefer-dist
      - name: Gerar SBOM CycloneDX
        uses: anchore/sbom-action@v0
        with:
          path: dist/package
          format: cyclonedx-json
          output-file: dist/sisp-cv-${{ github.ref_name }}.sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Gerar checksums SHA-256
        run: |
          cd dist
          sha256sum *.zip *.json > SHA256SUMS
      - name: Atestar proveniencia do pacote
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.zip
      - name: Atestar SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-path: dist/*.zip
          sbom-path: dist/sisp-cv-${{ github.ref_name }}.sbom.cdx.json
      - name: Criar release GitHub
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.json
            dist/SHA256SUMS
