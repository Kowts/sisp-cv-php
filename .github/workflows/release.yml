name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.2'
          extensions: json, pdo, pdo_sqlite, sqlite3
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: composer validate --strict
      - run: composer check
      - name: Criar pacote Composer
        run: |
          mkdir -p dist
          composer archive \
            --format=zip \
            --dir=dist \
            --file="sisp-cv-${GITHUB_REF_NAME}"
          mkdir -p dist/package
          unzip -q "dist/sisp-cv-${GITHUB_REF_NAME}.zip" -d dist/package
          composer install \
            --working-dir=dist/package \
            --no-dev \
            --no-interaction \
            --prefer-dist
      - name: Gerar SBOM CycloneDX
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: dist/package
          format: cyclonedx-json
          output-file: dist/sisp-cv-${{ github.ref_name }}.sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Gerar checksums SHA-256
        run: |
          cd dist
          sha256sum *.zip *.json > SHA256SUMS
      - name: Atestar proveniência do pacote
        uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e # v4
        with:
          subject-path: dist/*.zip
      - name: Atestar SBOM
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-path: dist/*.zip
          sbom-path: dist/sisp-cv-${{ github.ref_name }}.sbom.cdx.json
      - name: Criar release GitHub
        uses: softprops/action-gh-release@c12583777ecdfd3be55c69cf75464299dc01057e # v3
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.json
            dist/SHA256SUMS
